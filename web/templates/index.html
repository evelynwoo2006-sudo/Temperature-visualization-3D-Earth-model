<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球天气可视化系统 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .register-container {
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            border: 1px solid rgba(86, 240, 255, 0.3);
            box-shadow: 0 0 40px rgba(86, 240, 255, 0.1);
        }
        h1 {
            text-align: center;
            color: #56f0ff;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(86, 240, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #56f0ff;
        }
        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #1f7bff, #56f0ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>🌍 Global Weather</h1>
        <div class="subtitle">3D可视化气象平台</div>
        
        <form action="/register" method="post">
            <div class="input-group">
                <label>👤 用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="input-group">
                <label>📧 邮箱</label>
                <input type="email" name="email" placeholder="请输入邮箱" required>
            </div>
            <div class="input-group">
                <label>🔒 密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="register-btn">开始探索 →</button>
        </form>
        <div class="footer">© 2026 Global Weather Visualization System</div>
    </div>
</body>
</html>
